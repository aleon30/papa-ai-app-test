<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#66ea73">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Papita AI">
    <title>Papita AI - Chatbot Médico</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <main class="main-screen" id="mainScreen">
            <section class="welcome-stage">
                <div class="welcome-card">
                    <div class="papita-avatar welcome-avatar"><img src="papapng.png" id="papaimg"></div>
                    <div class="speech-bubble">
                        ¡Hola! Soy Papita, tu asistente de inteligencia artificial. Estoy aquí para ayudarte a detectar señales tempranas de burnout y apoyarte en tu bienestar. ¿Cómo te sientes hoy? 🥒
                    </div>
                </div>
            </section>

            <div class="composer-panel">
                <div class="input-area">
                    <div class="input-wrapper">
                        <input
                            type="text"
                            id="messageInput"
                            placeholder="Escribe tu mensaje aquí..."
                            class="message-input"
                            autocomplete="off"
                        >
                        <button id="sendButton" class="send-button" title="Enviar mensaje">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <div class="info-text">
                        Presiona <kbd>Enter</kbd> o haz clic en enviar
                    </div>
                </div>

                <div class="loading-indicator" id="loadingIndicator">
                    <div class="spinner"></div>
                    <span>Papita está pensando...</span>
                </div>
            </div>
        </main>

        <aside class="chat-drawer" id="chatDrawer" aria-hidden="true">
            <div class="chat-drawer-header">
                <div>
                    <p class="drawer-label">Conversación</p>
                    <h2>Papita</h2>
                </div>
                <button id="closeChatButton" class="close-chat-button" type="button" aria-label="Cerrar chat">✕</button>
            </div>
            <div class="chat-container">
                <div class="messages" id="messagesContainer"></div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
